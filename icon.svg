<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Spiral binding -->
  <rect x="88" y="72" width="16" height="40" rx="4" fill="#f5f0e8"/>
  <rect x="88" y="152" width="16" height="40" rx="4" fill="#f5f0e8"/>
  <rect x="88" y="232" width="16" height="40" rx="4" fill="#f5f0e8"/>
  <rect x="88" y="312" width="16" height="40" rx="4" fill="#f5f0e8"/>
  <rect x="88" y="392" width="16" height="40" rx="4" fill="#f5f0e8"/>

  <!-- Notebook body -->
  <path d="M108 56 L340 56 Q360 56 360 76 L360 200 Q320 180 270 180 Q180 180 140 260 Q120 300 120 360 L120 440 Q120 456 108 456 L108 56Z" fill="#f5f0e8" fill-rule="evenodd"/>

  <!-- Bookmark -->
  <path d="M280 56 L280 120 L300 100 L320 120 L320 56Z" fill="#d4c8b8"/>

  <!-- Clock circle -->
  <circle cx="300" cy="320" r="150" fill="none" stroke="#f5f0e8" stroke-width="28"/>

  <!-- Clock center dot -->
  <circle cx="300" cy="320" r="12" fill="#f5f0e8"/>

  <!-- Hour hand (10 o'clock position) -->
  <line x1="300" y1="320" x2="252" y2="252" stroke="#f5f0e8" stroke-width="16" stroke-linecap="round"/>

  <!-- Minute hand (2 o'clock position) -->
  <line x1="300" y1="320" x2="362" y2="248" stroke="#f5f0e8" stroke-width="12" stroke-linecap="round"/>

  <!-- Hour marker at 3 -->
  <rect x="420" y="312" width="20" height="16" rx="4" fill="#f5f0e8"/>

  <!-- Hour marker at 6 -->
  <rect x="292" y="440" width="16" height="20" rx="4" fill="#f5f0e8"/>
</svg>
